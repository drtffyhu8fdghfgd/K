<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/1lOjLFC.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: white;
      font-family: sans-serif;
      zoom: 0.9;
    }

    #gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 4px;
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
    }

    .row {
      display: flex;
      justify-content: center;
      margin-bottom: 4px;
    }

    video {
      margin: 2px;
      display: block;
      object-fit: contain;
      background: #000;
      cursor: pointer;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      z-index: 9999;
      gap: 20px;
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
      pointer-events: none;
    }

    #progress-bar-wrap {
      width: 260px;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.15s ease;
    }

    #progress-text {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div id="loading-label">Loading…</div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-text"></div>
  </div>
  <div id="gallery"></div>

  <script>
    const owner = 'drtffyhu8fdghfgd';
    const repo = 'h';
    const branch = 'main';

    async function getVideoUrls() {
      const res = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`
      );
      const data = await res.json();
      return data.tree
        .filter(f => f.type === 'blob' && f.path.toLowerCase().endsWith('.mp4'))
        .map(f => `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${f.path}`);
    }

    function getMetadata(url) {
      return new Promise(resolve => {
        const v = document.createElement('video');
        v.src = url;
        v.preload = 'auto';
        v.muted = true;
        v.playsInline = true;
        v.loop = true;
        v.onloadedmetadata = () => resolve({
          url,
          el: v,
          w: v.videoWidth,
          h: v.videoHeight,
          aspect: v.videoWidth / v.videoHeight
        });
        v.onerror = () => resolve(null);
      });
    }

    function waitForBuffer(vidObj, targetFraction) {
      return new Promise(resolve => {
        const v = vidObj.el;

        function check() {
          if (!v.duration) return;
          if (v.readyState >= 4) { resolve(); return; }
          if (v.buffered.length > 0) {
            const bufferedEnd = v.buffered.end(v.buffered.length - 1);
            if (bufferedEnd / v.duration >= targetFraction) {
              resolve();
              return;
            }
          }
        }

        v.addEventListener('progress', check);
        v.addEventListener('canplaythrough', resolve, { once: true });
        check();
      });
    }

    function updateProgress(done, total) {
      const pct = total ? (done / total) * 100 : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `${done} / ${total} videos buffered`;
    }

    async function loadVideos() {
      document.getElementById('loading-label').textContent = 'Fetching list…';
      const urls = await getVideoUrls();

      document.getElementById('loading-label').textContent = 'Buffering videos…';
      updateProgress(0, urls.length);

      // Kick off metadata + preload='auto' for ALL videos simultaneously
      const metas = (await Promise.all(urls.map(getMetadata))).filter(Boolean);

      let done = 0;
      updateProgress(0, metas.length);

      // Wait for every video to hit 50% buffered, track progress as each finishes
      await Promise.all(
        metas.map(async vid => {
          await waitForBuffer(vid, 0.5);
          done++;
          updateProgress(done, metas.length);
        })
      );

      // Build gallery DOM (reuses the already-buffering video elements)
      renderRows(metas);

      // Play all at once before revealing so first frame is ready
      for (const vid of metas) {
        vid.el.play().catch(() => {});
      }

      // Retry loop: every 600ms re-attempt play() on any video that's still paused
      // Stops once all are playing or after 10 seconds
      const retryStart = Date.now();
      const retryInterval = setInterval(() => {
        let anyPaused = false;
        for (const vid of metas) {
          const el = vid.el;
          if (el.paused && !el.ended && el.error === null) {
            el.play().catch(() => {});
            anyPaused = true;
          }
        }
        if (!anyPaused || Date.now() - retryStart > 10000) {
          clearInterval(retryInterval);
        }
      }, 600);

      // Crossfade: both transitions run simultaneously
      const loadingEl = document.getElementById('loading');
      const galleryEl = document.getElementById('gallery');

      loadingEl.style.opacity = '0';
      galleryEl.style.opacity = '1';

      loadingEl.addEventListener('transitionend', () => {
        loadingEl.style.display = 'none';
      }, { once: true });

      // After 1.5s check for frozen/black videos (loaded metadata but stream broken)
      setTimeout(() => {
        let anyRemoved = false;
        for (const vid of metas) {
          const el = vid.el;
          const frozen = el.currentTime === 0 && !el.paused && !el.ended;
          const errored = el.error !== null;
          if (frozen || errored) {
            const row = el.closest('.row');
            if (row) { row.remove(); anyRemoved = true; }
          }
        }
      }, 1500);
      // Each video continues buffering the remaining 50% in the background automatically
    }

    function renderRows(videos) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      const targetRowHeight = 220;
      const containerWidth = gallery.clientWidth || window.innerWidth;

      let row = [];
      let aspectSum = 0;

      for (const vid of videos) {
        row.push(vid);
        aspectSum += vid.aspect;

        if (containerWidth / aspectSum < targetRowHeight * 1.2) {
          addRow(row, containerWidth, aspectSum);
          row = [];
          aspectSum = 0;
        }
      }

      if (row.length) addRow(row, containerWidth, aspectSum);
    }

    function addRow(rowVids, containerWidth, totalAspect) {
      const gallery = document.getElementById('gallery');
      const rowEl = document.createElement('div');
      rowEl.className = 'row';

      const height = containerWidth / totalAspect;

      for (const vid of rowVids) {
        const el = vid.el;
        el.width = height * vid.aspect;
        el.height = height;
        el.autoplay = false;
        el.muted = true;

        el.addEventListener('mouseenter', () => {
          el.muted = false;
          el.volume = 1.0;
        });
        el.addEventListener('mouseleave', () => {
          el.muted = true;
        });

        rowEl.appendChild(el);
      }

      gallery.appendChild(rowEl);
    }

    window.addEventListener('resize', () => {
      clearTimeout(window._resizeTimer);
      window._resizeTimer = setTimeout(loadVideos, 300);
    });

    loadVideos();
  </script>
</body>
</html>
