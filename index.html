<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/1lOjLFC.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: white;
      font-family: sans-serif;
    }

    #gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 4px;
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
    }

    .row {
      display: flex;
      justify-content: center;
      margin-bottom: 4px;
    }

    video {
      margin: 2px;
      display: block;
      object-fit: contain;
      background: #000;
      cursor: pointer;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      z-index: 9999;
      gap: 20px;
    }

    #progress-bar-wrap {
      width: 260px;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.15s ease;
    }

    #progress-text {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div id="loading-label">Loading…</div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-text"></div>
  </div>
  <div id="gallery"></div>

  <script>
    const owner = 'drtffyhu8fdghfgd';
    const repo = 'h';
    const branch = 'main';

    async function getVideoUrls() {
      const res = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`
      );
      const data = await res.json();
      return data.tree
        .filter(f => f.type === 'blob' && f.path.toLowerCase().endsWith('.mp4'))
        .map(f => `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${f.path}`);
    }

    function getMetadata(url) {
      return new Promise(resolve => {
        const v = document.createElement('video');
        v.src = url;
        v.preload = 'auto'; // start buffering right away
        v.muted = true;
        v.playsInline = true;
        v.loop = true;
        v.onloadedmetadata = () => resolve({
          url,
          el: v,
          w: v.videoWidth,
          h: v.videoHeight,
          aspect: v.videoWidth / v.videoHeight
        });
        v.onerror = () => resolve(null);
      });
    }

    // Returns a promise that resolves when the video has buffered >= targetFraction of its duration
    function waitForBuffer(vidObj, targetFraction) {
      return new Promise(resolve => {
        const v = vidObj.el;

        function check() {
          if (!v.duration) return;
          if (v.readyState >= 4) { resolve(); return; } // fully loaded
          if (v.buffered.length > 0) {
            const bufferedEnd = v.buffered.end(v.buffered.length - 1);
            if (bufferedEnd / v.duration >= targetFraction) {
              resolve();
              return;
            }
          }
        }

        v.addEventListener('progress', check);
        v.addEventListener('canplaythrough', resolve, { once: true });
        check(); // check immediately in case already buffered
      });
    }

    function updateProgress(done, total) {
      const pct = total ? (done / total) * 100 : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `${done} / ${total} videos buffered`;
    }

    async function loadVideos() {
      // 1. Fetch list
      document.getElementById('loading-label').textContent = 'Fetching list…';
      const urls = await getVideoUrls();
      const total = urls.length;

      // 2. Load metadata for all videos simultaneously (also kicks off preload='auto' buffering)
      document.getElementById('loading-label').textContent = 'Buffering videos…';
      updateProgress(0, total);

      const metas = (await Promise.all(urls.map(getMetadata))).filter(Boolean);

      // 3. Wait for each video to reach 50% buffered, update progress as they come in
      let done = 0;
      updateProgress(0, metas.length);

      await Promise.all(
        metas.map(async vid => {
          await waitForBuffer(vid, 0.5);
          done++;
          updateProgress(done, metas.length);
        })
      );

      // 4. Build and show gallery
      renderRows(metas);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('gallery').style.opacity = 1;

      // 5. Play all simultaneously
      for (const vid of metas) {
        vid.el.play().catch(() => {});
      }
      // Background buffering continues automatically
    }

    function renderRows(videos) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      const targetRowHeight = 220;
      const containerWidth = gallery.clientWidth || window.innerWidth;

      let row = [];
      let aspectSum = 0;

      for (const vid of videos) {
        row.push(vid);
        aspectSum += vid.aspect;

        if (containerWidth / aspectSum < targetRowHeight * 1.2) {
          addRow(row, containerWidth, aspectSum);
          row = [];
          aspectSum = 0;
        }
      }

      if (row.length) addRow(row, containerWidth, aspectSum);
    }

    function addRow(rowVids, containerWidth, totalAspect) {
      const gallery = document.getElementById('gallery');
      const rowEl = document.createElement('div');
      rowEl.className = 'row';

      const height = containerWidth / totalAspect;

      for (const vid of rowVids) {
        const el = vid.el; // reuse the already-buffering element
        el.width = height * vid.aspect;
        el.height = height;
        el.autoplay = false; // we call play() manually after all are ready
        el.muted = true;

        el.addEventListener('mouseenter', () => {
          el.muted = false;
          el.volume = 1.0;
        });
        el.addEventListener('mouseleave', () => {
          el.muted = true;
        });

        rowEl.appendChild(el);
      }

      gallery.appendChild(rowEl);
    }

    window.addEventListener('resize', () => {
      clearTimeout(window._resizeTimer);
      window._resizeTimer = setTimeout(loadVideos, 300);
    });

    loadVideos();
  </script>
</body>
</html>
