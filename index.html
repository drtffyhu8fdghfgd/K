<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/1lOjLFC.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: white;
      font-family: sans-serif;
    }

    #gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 4px;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .row {
      display: flex;
      justify-content: center;
      margin-bottom: 4px;
    }

    video {
      margin: 2px;
      display: block;
      object-fit: contain;
      background: #000;
      cursor: pointer;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      z-index: 9999;
      gap: 20px;
    }

    #progress-bar-wrap {
      width: 260px;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.2s ease;
    }

    #progress-text {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div id="loading-label">Loading…</div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-text">0 / 0</div>
  </div>
  <div id="gallery"></div>

  <script>
    const owner = 'drtffyhu8fdghfgd';
    const repo = 'h';
    const branch = 'main';

    async function getVideoUrls() {
      const res = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`
      );
      const data = await res.json();
      return data.tree
        .filter(f => f.type === 'blob' && f.path.toLowerCase().endsWith('.mp4'))
        .map(f => `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${f.path}`);
    }

    function updateProgress(done, total) {
      const pct = total ? (done / total) * 100 : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `${done} / ${total}`;
    }

    // Fetch a single video URL into a blob, return a blob URL
    async function fetchBlob(url) {
      const res = await fetch(url);
      const blob = await res.blob();
      return URL.createObjectURL(blob);
    }

    // Load all videos into RAM as blob URLs, with progress tracking
    async function preloadAllBlobs(urls) {
      const blobUrls = new Array(urls.length).fill(null);
      let done = 0;
      updateProgress(0, urls.length);

      await Promise.all(
        urls.map(async (url, i) => {
          try {
            blobUrls[i] = await fetchBlob(url);
          } catch (e) {
            blobUrls[i] = null;
          }
          done++;
          updateProgress(done, urls.length);
        })
      );

      return blobUrls;
    }

    // Get video dimensions from a blob URL
    function getVideoDimensions(blobUrl) {
      return new Promise(resolve => {
        const v = document.createElement('video');
        v.src = blobUrl;
        v.preload = 'metadata';
        v.onloadedmetadata = () => resolve({
          blobUrl,
          w: v.videoWidth,
          h: v.videoHeight,
          aspect: v.videoWidth / v.videoHeight
        });
        v.onerror = () => resolve(null);
      });
    }

    async function loadVideos() {
      document.getElementById('loading-label').textContent = 'Fetching list…';
      const urls = await getVideoUrls();

      document.getElementById('loading-label').textContent = 'Loading videos…';
      const blobUrls = await preloadAllBlobs(urls);

      document.getElementById('loading-label').textContent = 'Reading metadata…';
      const metas = await Promise.all(
        blobUrls.filter(Boolean).map(getVideoDimensions)
      );

      renderRows(metas.filter(Boolean));

      document.getElementById('loading').style.display = 'none';
      const gallery = document.getElementById('gallery');
      gallery.style.opacity = 1;
    }

    function renderRows(videos) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      const targetRowHeight = 220;
      const containerWidth = gallery.clientWidth || window.innerWidth;

      let row = [];
      let aspectSum = 0;

      for (const vid of videos) {
        row.push(vid);
        aspectSum += vid.aspect;

        if (containerWidth / aspectSum < targetRowHeight * 1.2) {
          addRow(row, containerWidth, aspectSum);
          row = [];
          aspectSum = 0;
        }
      }

      if (row.length) addRow(row, containerWidth, aspectSum);
    }

    function addRow(rowVids, containerWidth, totalAspect) {
      const gallery = document.getElementById('gallery');
      const rowEl = document.createElement('div');
      rowEl.className = 'row';

      const height = containerWidth / totalAspect;

      for (const vid of rowVids) {
        const el = document.createElement('video');
        el.src = vid.blobUrl;  // use in-memory blob URL
        el.width = height * vid.aspect;
        el.height = height;

        el.autoplay = true;
        el.loop = true;
        el.muted = true;
        el.playsInline = true;

        el.addEventListener('mouseenter', () => {
          el.muted = false;
          el.volume = 1.0;
        });

        el.addEventListener('mouseleave', () => {
          el.muted = true;
        });

        rowEl.appendChild(el);
      }

      gallery.appendChild(rowEl);
    }

    window.addEventListener('resize', () => {
      clearTimeout(window._resizeTimer);
      window._resizeTimer = setTimeout(loadVideos, 300);
    });

    loadVideos();
  </script>
</body>
</html>
