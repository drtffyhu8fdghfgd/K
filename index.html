<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/1lOjLFC.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: white;
      font-family: sans-serif;
      zoom: 0.9;
      overflow-x: hidden;
    }

    #gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 4px;
      opacity: 0;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .row {
      display: flex;
      justify-content: center; /* Centers the last row if it doesn't fill the width */
      margin-bottom: 4px;
      width: 100%;
      gap: 4px;
    }

    video {
      display: block;
      object-fit: cover; /* Changed to cover for a cleaner 'hole-filling' look */
      background: #111;
      cursor: pointer;
      border-radius: 2px;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      z-index: 9999;
      gap: 20px;
      opacity: 1;
      transition: opacity 0.8s ease-in-out;
      pointer-events: none;
    }

    #progress-bar-wrap {
      width: 260px;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.2s ease;
    }

    #progress-text {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div id="loading-label">Loading…</div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-text"></div>
  </div>
  <div id="gallery"></div>

  <script>
    const owner = 'drtffyhu8fdghfgd';
    const repo = 'h';
    const branch = 'main';

    async function getVideoUrls() {
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`);
      const data = await res.json();
      return data.tree
        .filter(f => f.type === 'blob' && f.path.toLowerCase().endsWith('.mp4'))
        .map(f => `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${f.path}`);
    }

    function getMetadata(url) {
      return new Promise(resolve => {
        const v = document.createElement('video');
        v.src = url;
        v.preload = 'auto';
        v.muted = true;
        v.playsInline = true;
        v.setAttribute('muted', '');
        v.setAttribute('playsinline', '');
        v.loop = true;
        v.onloadedmetadata = () => resolve({
          url, el: v, w: v.videoWidth, h: v.videoHeight, aspect: v.videoWidth / v.videoHeight
        });
        v.onerror = () => resolve(null);
      });
    }

    function waitForBuffer(vidObj) {
      return new Promise(resolve => {
        const v = vidObj.el;
        const check = () => {
          if (v.readyState >= 3) resolve();
          else requestAnimationFrame(check);
        };
        v.addEventListener('canplay', resolve, { once: true });
        check();
      });
    }

    async function loadVideos() {
      const urls = await getVideoUrls();
      let metas = (await Promise.all(urls.map(getMetadata))).filter(Boolean);

      // Sort: Landscape (wider) first, Portrait (narrower) last
      metas.sort((a, b) => b.aspect - a.aspect);

      let done = 0;
      const total = metas.length;
      document.getElementById('progress-text').textContent = `0 / ${total}`;

      await Promise.all(metas.map(async vid => {
        await waitForBuffer(vid);
        done++;
        document.getElementById('progress-bar').style.width = (done/total*100) + '%';
        document.getElementById('progress-text').textContent = `${done} / ${total} ready`;
      }));

      renderRows(metas);

      metas.forEach(vid => vid.el.play().catch(() => {}));

      const loadingEl = document.getElementById('loading');
      const galleryEl = document.getElementById('gallery');
      galleryEl.style.opacity = '1';
      setTimeout(() => {
        loadingEl.style.opacity = '0';
        setTimeout(() => { loadingEl.style.display = 'none'; }, 800);
      }, 200);
    }

    function renderRows(videos) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      const targetRowHeight = 240;
      const maxRowHeight = 320; // Prevents portrait videos from becoming huge
      const containerWidth = gallery.clientWidth || window.innerWidth;
      
      let row = [];
      let aspectSum = 0;

      for (const vid of videos) {
        row.push(vid);
        aspectSum += vid.aspect;

        // If current row is full enough to reach target height
        if (containerWidth / aspectSum < targetRowHeight) {
          addRow(row, containerWidth, aspectSum, maxRowHeight);
          row = [];
          aspectSum = 0;
        }
      }
      
      // Last row logic: don't stretch to full width if it's too tall
      if (row.length) {
        let lastRowHeight = containerWidth / aspectSum;
        if (lastRowHeight > maxRowHeight) {
          addRow(row, containerWidth, aspectSum, maxRowHeight, true);
        } else {
          addRow(row, containerWidth, aspectSum, maxRowHeight, false);
        }
      }
    }

    function addRow(rowVids, containerWidth, totalAspect, maxH, isLastRow = false) {
      const gallery = document.getElementById('gallery');
      const rowEl = document.createElement('div');
      rowEl.className = 'row';
      
      let height = containerWidth / totalAspect;
      if (height > maxH) height = maxH; // Cap the height

      for (const vid of rowVids) {
        const el = vid.el;
        el.style.width = (height * vid.aspect) + 'px';
        el.style.height = height + 'px';
        el.addEventListener('mouseenter', () => { el.muted = false; el.volume = 1.0; });
        el.addEventListener('mouseleave', () => { el.muted = true; });
        rowEl.appendChild(el);
      }
      gallery.appendChild(rowEl);
    }

    loadVideos();
  </script>
</body>
</html>
